# ==============================================================================
# CD — Build & Deploy to Azure App Service (Step 24)
#
# Triggers on push to master AFTER CI passes.
#
# Pipeline:
#   1. Run full test suite (same as ci.yml)
#   2. Build Docker image
#   3. Push to Azure Container Registry (ACR)
#   4. Deploy to Azure App Service (Web App for Containers)
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS          — Service principal JSON (az ad sp create-for-rbac)
#   ACR_LOGIN_SERVER           — e.g. familyhostel.azurecr.io
#   ACR_USERNAME               — ACR admin username
#   ACR_PASSWORD               — ACR admin password
#   AZURE_WEBAPP_NAME          — Azure App Service name
#   AZURE_RESOURCE_GROUP       — Azure resource group name
# ==============================================================================

name: CD — Build & Deploy

on:
  push:
    branches: [master]

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Run tests (gate for deployment)
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.offline
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: ci_db
      DB_USER: ci_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: "5432"
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      TELEGRAM_BOT_TOKEN: ""
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Django system check
        run: python manage.py check --settings=config.settings.offline

      - name: Run migrations (SQLite in-memory)
        run: python manage.py migrate --settings=config.settings.offline

      - name: Run tests with pytest
        run: pytest --tb=short -q

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.offline

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Build Docker image & push to ACR
  # ────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/familyhostel-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/familyhostel-backend:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Azure App Service
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/familyhostel-backend:${{ github.sha }}

      - name: Wait for deployment to settle
        run: sleep 30

      - name: Verify health check
        run: |
          HEALTH_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health/"
          echo "Checking $HEALTH_URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 30 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Azure logout
        if: always()
        run: az logout
