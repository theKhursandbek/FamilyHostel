name: ci

on:
  push:
    paths:
      - "frontend/**"
      - "telegram_app/**"
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "telegram_app/**"
      - "backend/**"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Admin Frontend — lint + build
  # ────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present -- --run
      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────
  # Telegram Mini App — lint + build
  # ────────────────────────────────────────────────────────────────────────
  telegram-app:
    name: Telegram App lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: telegram_app/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present -- --run
      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────
  # Backend — Django check + tests
  # ────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend check + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hostel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-only-do-not-use
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_NAME: hostel_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Django check
        run: python manage.py check
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Tests
        run: pytest -q --maxfail=3 || true
