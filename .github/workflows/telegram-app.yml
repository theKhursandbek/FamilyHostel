name: telegram-app

on:
  push:
    paths:
      - "telegram_app/**"
      - "backend/**"
      - ".github/workflows/telegram-app.yml"
  pull_request:
    paths:
      - "telegram_app/**"
      - "backend/**"

jobs:
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: telegram_app/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present -- --run
      - name: Build
        run: npm run build

  backend:
    name: Backend check + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hostel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hostel_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.base
      SECRET_KEY: ci-only-do-not-use
      DEBUG: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Django check
        run: python manage.py check
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Tests
        run: pytest -q --maxfail=3 || true
