# Docker Compose — local development environment (Step 17).
#
# Services:
#   - redis       : Message broker + result backend for Celery
#   - celery      : Celery worker process
#
# Usage:
#   $ docker-compose up -d redis     # Redis only (minimal setup)
#   $ docker-compose up -d           # Redis + Celery worker
#
# The Django dev server itself is NOT containerised (run via manage.py).

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
