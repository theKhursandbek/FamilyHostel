# ==============================================================================
# Docker Compose — FamilyHostel production stack (Steps 22-23)
#
# Services:
#   - nginx       : Reverse proxy (port 80) — static/media/WebSocket
#   - backend     : Django (gunicorn + uvicorn ASGI workers)
#   - postgres    : PostgreSQL 16
#   - redis       : Broker for Celery + Channels
#   - celery      : Celery background worker
#
# Usage:
#   1. Copy .env.docker.example → .env.docker  and fill in secrets
#   2. docker-compose up --build -d
#   3. Open http://localhost
# ==============================================================================

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_NAME:-hostel_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hostel_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Django backend (gunicorn + uvicorn workers)
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Celery worker
  # ──────────────────────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx reverse proxy (Step 23)
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hostel_net

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:

# ==============================================================================
# Network
# ==============================================================================
networks:
  hostel_net:
    driver: bridge
