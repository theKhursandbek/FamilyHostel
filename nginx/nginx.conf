# ==============================================================================
# Nginx — Hotel reverse proxy
#
# Routes:
#   /api/     → Django backend (gunicorn)
#   /admin/   → Django admin
#   /health/  → Django health-check
#   /ws/      → WebSocket (Django Channels via uvicorn)
#   /static/  → collected static files
#   /media/   → user-uploaded media files
#   /app/     → Telegram Mini App SPA
#   /         → Admin frontend SPA (catch-all)
# ==============================================================================

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ──────────────────────────────────────────────────────────────────────
    # Gzip compression
    # ──────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ──────────────────────────────────────────────────────────────────────
    # Security headers
    # ──────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────────────────────────────
    # Timeouts
    # ──────────────────────────────────────────────────────────────────────
    client_max_body_size 10M;

    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    # ──────────────────────────────────────────────────────────────────────
    # Static files — Django collected static
    # ──────────────────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────────────────────────────────
    # Media files — user-uploaded
    # ──────────────────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ──────────────────────────────────────────────────────────────────────
    # WebSocket — /ws/ → backend with Upgrade headers (HTTP/1.1)
    # ──────────────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ──────────────────────────────────────────────────────────────────────
    # API, Admin, Health — proxy to Django backend
    # ──────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /health/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ──────────────────────────────────────────────────────────────────────
    # Telegram Mini App SPA — /app/
    #
    # Served from the telegram-app build container's dist/ volume.
    # All non-asset routes fall back to index.html for client-side routing.
    # ──────────────────────────────────────────────────────────────────────
    location /app/ {
        alias /app/telegram/;
        try_files $uri $uri/ /app/index.html;

        # Cache static assets aggressively (hashed filenames)
        location ~* /app/assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ──────────────────────────────────────────────────────────────────────
    # Admin Frontend SPA — / (catch-all)
    #
    # Served from the frontend build container's dist/ volume.
    # All non-asset routes fall back to index.html for client-side routing.
    # ──────────────────────────────────────────────────────────────────────
    location / {
        root /app/frontend;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (hashed filenames)
        location ~* /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
