# ==============================================================================
# Docker Compose — Hotel production stack
#
# Services:
#   - nginx         : Reverse proxy (port 80) — serves SPAs, static/media, WS
#   - backend       : Django (gunicorn + uvicorn ASGI workers)
#   - postgres      : PostgreSQL 16
#   - redis         : Broker for Celery + Channels
#   - celery        : Celery background worker
#   - celery-beat   : Celery periodic task scheduler
#   - frontend      : Admin panel SPA (build-only, provides static files)
#   - telegram-app  : Telegram Mini App SPA (build-only, provides static files)
#   - telegram-bot  : Python Telegram bot (long-polling)
#
# Usage:
#   1. Copy .env.docker.example → .env.docker  and fill in secrets
#   2. docker-compose up --build -d
#   3. Open http://localhost        (admin panel)
#   4. Open http://localhost/app/   (Telegram Mini App)
# ==============================================================================

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_NAME:-hostel_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hostel_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Django backend (gunicorn + uvicorn workers)
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Celery worker
  # ──────────────────────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Celery Beat scheduler
  # ──────────────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend Admin Panel (build-only init container)
  #
  # Builds the Vite React app and copies dist/ into a shared volume.
  # Nginx serves the files from that volume.
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-}
    volumes:
      - frontend_dist:/usr/share/nginx/html
    restart: "no"
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Telegram Mini App (build-only init container)
  #
  # Same pattern as frontend — builds and copies dist/ to a shared volume.
  # Served by Nginx under /app/ path prefix.
  # ──────────────────────────────────────────────────────────────────────────
  telegram-app:
    build:
      context: ./telegram_app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    volumes:
      - telegram_dist:/usr/share/nginx/html
    restart: "no"
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Telegram Bot (long-polling Python process)
  # ──────────────────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./telegram_app/bot
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      TELEGRAM_BOT_ENV: ${TELEGRAM_BOT_ENV:-prod}
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hostel_net

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx reverse proxy
  #
  # Serves:
  #   /            → Admin frontend SPA
  #   /app/        → Telegram Mini App SPA
  #   /api/, /admin/, /health/  → Django backend
  #   /ws/         → WebSocket (Django Channels)
  #   /static/     → Django collected static
  #   /media/      → User uploads
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - frontend_dist:/app/frontend:ro
      - telegram_dist:/app/telegram:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
      - telegram-app
    restart: unless-stopped
    networks:
      - hostel_net

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  frontend_dist:
  telegram_dist:

# ==============================================================================
# Network
# ==============================================================================
networks:
  hostel_net:
    driver: bridge
